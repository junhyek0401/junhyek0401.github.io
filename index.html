<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박준혁 | 포트폴리오</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #333;
            line-height: 1.6;
        }

        /* 네비게이션 바 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 80px;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #2563eb;
        }

        nav a {
            text-decoration: none;
            color: #4b5563;
            margin-left: 30px;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #2563eb;
        }

        /* 메인 히어로 섹션 (이미지 스타일 반영) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* 은은한 보라/파랑 그라데이션 배경 */
            background: radial-gradient(circle at 50% 50%, rgba(238, 242, 255, 1) 0%, rgba(243, 244, 246, 1) 100%);
            padding: 0 20px;
        }

        .sub-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #2563eb;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .main-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1f2937;
        }

        /* '코딩 애호가' 부분 포인트 컬러 */
        .point-color {
            background: linear-gradient(to right, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 18px;
            color: #4b5563;
            max-width: 600px;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* 버튼 스타일 */
        .cta-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background-color: #2563eb;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: white;
            color: #4b5563;
            border: 1px solid #e5e7eb;
        }

        .btn-secondary:hover {
            background-color: #f3f4f6;
            transform: translateY(-2px);
        }

        /* 하단 이메일 아이콘 영역 */
        .footer-icon {
            margin-top: 50px;
            color: #9ca3af;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">JunHyeok.</div>
        <nav>
            <a href="#about">소개</a>
            <a href="#skills">기술</a>
            <a href="#projects">프로젝트</a>
            <a href="#contact">연락처</a>
        </nav>
    </header>

    <section class="hero">
        <div class="sub-title">Welcome to my portfolio</div>
        <h1 class="main-title">안녕하세요, <span class="point-color">프론트엔드 개발자</span> 박준혁입니다.</h1>
        <p class="description">
            동양미래대학교 컴퓨터공학과 1학년에 재학 중입니다.<br>
            현재 HTML, Python, SW개발도구활용을 배우며 탄탄한 기본기를 쌓고 있습니다.<br>
            사용자 경험을 중요하게 생각하는 깔끔한 코드를 작성하기 위해 노력합니다.
        </p>
        <div class="cta-buttons">
            <a href="#projects" class="btn btn-primary">프로젝트 보기</a>
            <a href="#contact" class="btn btn-secondary">연락하기</a>
        </div>
        
        <div class="footer-icon">✉</div>
    </section>

</body>
</html>
